<!DOCTYPE html>
<html>
<head>
<style>
  body { text-align:center; font-family:sans-serif; }
  img { max-width:90%; max-height:80vh; }
  button { padding:10px 20px; margin:10px; }
</style>
</head>
<body>

<img id="viewer" src="1.JPG">
<div id="filename"></div>

<div>
  <button onclick="prev()">Prev</button>
  <button onclick="next()">Next</button>
</div>
<br>Right click and 'save image' to download the image

<script>
const images = [
 "1.JPG",
 "2.JPG",
 "3.JPG",
 "4.JPG",
 "5.JPG",
 "after1-Mar26.jpg",   
 "railTrees1-06Jun25.JPG",
 "back garden-1998.jpg",           
 "railTrees2-06Jun25.JPG",
 "compare before and after-Mar26.jpg", 
  "planShownToMeAtMeeting.jpg",
 "railTrees3-06Jun25.JPG",
 "FoxCrow-04May25.jpg",                   
 "RailwayFromBridge-15May25.jpg",
 "foxDrinking-03Jul25.jpg",              
 "railway in 1998.jpg",
 "garden-oct23.JPG",                      
 "treeRemovalBegins-16Mar26.jpg",                           
 "view from garden of railway-sep18.JPG",
 "rabbit-jun19.JPG",
 "badger-aug17.jpg"
];

let index = 0;

function show(){
  document.getElementById("viewer").src = images[index];
  document.getElementById("filename").textContent = images[index];
}

function next(){
  index = (index + 1) % images.length;
  show();
}

function prev(){
  index = (index - 1 + images.length) % images.length;
  show();
}
</script>

</body>
</html>
